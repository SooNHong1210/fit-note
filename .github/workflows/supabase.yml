# supabase/migrations/** 를 main에 push하면 Supabase에 마이그레이션 자동 적용.
# (Supabase CLI `db push` — 적용 이력이 schema_migrations 에 기록됨)
#
# 필요한 GitHub 시크릿 (Settings → Secrets and variables → Actions):
#   SUPABASE_DB_URL = Supabase 연결 문자열(비밀번호 포함)
#     Supabase → Settings → Database → Connection string → URI →
#       "Session pooler"(IPv4, 포트 5432) 권장. 예:
#       postgresql://postgres.<ref>:<password>@aws-0-<region>.pooler.supabase.com:5432/postgres
#     (GitHub Actions는 IPv4라 Direct 연결(IPv6)은 실패할 수 있어 풀러 사용)
#
# ⚠️ rls_secure 마이그레이션은 익명 인증 기반이므로
#    Supabase → Authentication → Anonymous sign-ins 활성화 필요.

name: Supabase migrate

on:
  push:
    branches: [main]
    paths: ["supabase/migrations/**"]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: SUPABASE_DB_URL 미설정 안내
        if: ${{ env.DB_URL == '' }}
        run: echo "::warning::SUPABASE_DB_URL 시크릿이 없어 마이그레이션을 건너뜁니다."

      - uses: supabase/setup-cli@v1
        if: ${{ env.DB_URL != '' }}
        with:
          version: latest

      - name: Push migrations
        if: ${{ env.DB_URL != '' }}
        run: supabase db push --db-url "$DB_URL"
